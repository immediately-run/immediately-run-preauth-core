name: ci

# Build, test, lint on every PR + push; publish to npm on push to main via npm
# trusted publishing (OIDC), mirroring the SDK's release job. site-main + backend
# consume this package as an ordinary pinned npm dependency (NOT a file: sibling),
# so it must be published for their CI `npm ci`/tsc to resolve it.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false # never cache in release builds
      # Trusted publishing requires npm >= 11.5.1
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run lint
      - name: Publish to npm via trusted publishing (skip if version already published)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          # setup-node's registry-url writes an .npmrc bound to NODE_AUTH_TOKEN.
          # Clearing it forces OIDC trusted publishing instead of (empty) token auth.
          NODE_AUTH_TOKEN: ""
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VER=$(node -p "require('./package.json').version")
          if npm view "$PKG_NAME@$PKG_VER" version >/dev/null 2>&1; then
            echo "::notice::$PKG_NAME@$PKG_VER already published — skipping."
            exit 0
          fi
          npm publish --access public
